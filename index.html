<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storegårdskyrkan i Eksjö</title>
  <meta name="description" content="Storegårdskyrkan i Eksjö – en varm och välkomnande gemenskap med gudstjänster, scout, Alpha, loppis och mötesplatser för alla åldrar." />

  <style>
    :root {
      --bg: #f7efe4;
      --bg-soft: #fff8ef;
      --card: #ffffff;
      --text: #2f241c;
      --muted: #6f5f52;
      --accent: #b86b3c;
      --accent-dark: #8d4f2b;
      --green: #6f7f59;
      --green-dark: #4d5f3d;
      --sand: #ead6bd;
      --line: rgba(47, 36, 28, 0.12);
      --shadow: 0 18px 45px rgba(68, 45, 28, 0.14);
      --radius: 24px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(184, 107, 60, 0.16), transparent 32rem),
        linear-gradient(180deg, #fff8ef 0%, var(--bg) 45%, #fffaf3 100%);
      color: var(--text);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    /* Header */

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 248, 239, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .brand-text strong {
      font-size: 1.08rem;
      letter-spacing: -0.01em;
    }

    .brand-text span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .desktop-nav a {
      padding: 10px 14px;
      border-radius: 999px;
      color: #44352a;
      font-weight: 650;
      font-size: 0.96rem;
    }

    .desktop-nav a:hover {
      background: rgba(184, 107, 60, 0.12);
      color: var(--accent-dark);
    }

    .menu-toggle {
      display: none;
    }

    .hamburger {
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      align-items: center;
      justify-content: center;
      background: #fff7ec;
      cursor: pointer;
    }

    .hamburger span,
    .hamburger span::before,
    .hamburger span::after {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 999px;
      position: relative;
      transition: 0.2s ease;
    }

    .hamburger span::before,
    .hamburger span::after {
      content: "";
      position: absolute;
      left: 0;
    }

    .hamburger span::before {
      top: -7px;
    }

    .hamburger span::after {
      top: 7px;
    }

    .mobile-nav {
      display: none;
    }

    /* Hero */

    .hero {
      padding: 48px 0 34px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(320px, 0.98fr);
      gap: 28px;
      align-items: stretch;
    }

    .hero-content {
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: clamp(26px, 4vw, 54px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 440px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(111, 127, 89, 0.14);
      color: var(--green-dark);
      font-weight: 750;
      font-size: 0.9rem;
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 5.5rem);
      max-width: 8.5ch;
    }

    .hero-content p {
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      max-width: 58ch;
      color: var(--muted);
      margin: 24px 0 0;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 750;
      border: 1px solid transparent;
    }

    .button.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 28px rgba(184, 107, 60, 0.26);
    }

    .button.primary:hover {
      background: var(--accent-dark);
    }

    .button.secondary {
      background: #fffaf3;
      color: var(--accent-dark);
      border-color: rgba(184, 107, 60, 0.28);
    }

    .button.secondary:hover {
      background: rgba(184, 107, 60, 0.1);
    }

    .hero-image {
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 440px;
      box-shadow: var(--shadow);
      position: relative;
      background: #d9c2aa;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-quote {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 248, 239, 0.9);
      backdrop-filter: blur(8px);
      color: var(--text);
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .hero-quote strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .hero-quote span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Shared sections */

    section {
      padding: 34px 0;
      scroll-margin-top: 96px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 22px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .section-head p {
      max-width: 54ch;
      color: var(--muted);
      margin: 8px 0 0;
    }

    .panel {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* Calendar */

    .calendar-wrap {
      display: grid;
      grid-template-columns: 0.86fr 1.14fr;
      gap: 22px;
      align-items: stretch;
    }

    .calendar-intro {
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(111, 127, 89, 0.92), rgba(77, 95, 61, 0.94)),
        url("images/Kyrkan-sept-2011-062.jpg") center/cover;
      color: white;
      min-height: 310px;
      display: flex;
      flex-direction: column;
      justify-content: end;
      overflow: hidden;
      position: relative;
    }

    .calendar-intro::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.22));
    }

    .calendar-intro > * {
      position: relative;
    }

    .calendar-intro h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .calendar-intro p {
      margin: 12px 0 0;
      color: rgba(255,255,255,0.88);
    }

    .event-list {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .event-card {
      display: grid;
      grid-template-columns: 82px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-radius: 20px;
      background: #fffaf5;
      border: 1px solid rgba(47,36,28,0.09);
    }

    .event-date {
      background: var(--sand);
      color: var(--text);
      border-radius: 18px;
      padding: 12px 10px;
      text-align: center;
      font-weight: 800;
      line-height: 1.1;
    }

    .event-date span {
      display: block;
      font-size: 1.55rem;
    }

    .event-card h3 {
      font-size: 1.12rem;
      margin-bottom: 4px;
    }

    .event-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .event-tag {
      background: rgba(184, 107, 60, 0.12);
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.86rem;
      font-weight: 750;
      white-space: nowrap;
    }

    /* New here */

    .new-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(280px, 1.05fr);
      gap: 22px;
      align-items: stretch;
    }

    .pastor-card {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 22px;
      padding: 22px;
      align-items: center;
    }

    .pastor-card img {
      width: 180px;
      height: 220px;
      object-fit: cover;
      border-radius: 22px;
