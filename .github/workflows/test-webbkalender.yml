name: Uppdatera webbkalender

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
            }
          allow-no-subscriptions: true

      - name: Hämta kalenderdata från Graph
        run: |
          TOKEN=$(az account get-access-token --resource-type ms-graph --query accessToken -o tsv)

          curl \
            -H "Authorization: Bearer $TOKEN" \
            'https://graph.microsoft.com/v1.0/users/webbkalender@storegardskyrkan.se/calendar/events?$select=subject,start,end,location,categories,bodyPreview' \
            > graph-response.json

      - name: Skapa events.json
        run: |
          python3 << 'EOF'
          import json

          with open("graph-response.json", encoding="utf-8") as f:
              data = json.load(f)

          events = []

          for item in data["value"]:
              events.append({
                  "title": item.get("subject", ""),
                  "start": item["start"]["dateTime"],
                  "end": item["end"]["dateTime"],
                  "location": item.get("location", {}).get("displayName", ""),
                  "categories": item.get("categories", []),
                  "description": item.get("bodyPreview", "")
              })

          with open("events.json", "w", encoding="utf-8") as f:
              json.dump(events, f, ensure_ascii=False, indent=2)

          print("events.json skapad:")
          print(open("events.json", encoding="utf-8").read())
          EOF

      - name: Commit events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add events.json

          if git diff --staged --quiet; then
            echo "Inga ändringar"
          else
            git commit -m "Uppdatera events.json"
            git push
          fi
